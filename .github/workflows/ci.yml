name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python frozen suite — builds the extension (maturin) on every OS, proving cross-platform wheels
  # and running the thread-safety tests everywhere.
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install (builds the extension)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict, on the type stubs)
        run: mypy
      - name: Pytest (frozen M1 + M4 suite, incl. the super-linear reduction benchmark)
        run: pytest tests/frozen -p no:cacheprovider

  # Pure-Rust IR: formatting, clippy (deny warnings), unit tests, and the loom model.
  rust:
    name: rust (clippy + cargo test + loom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Link libpython for the test binary
        run: echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var(\"LIBDIR\"))')" >> "$GITHUB_ENV"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: loom model of the locking discipline
        run: RUSTFLAGS="--cfg loom" cargo test --lib loom_model

  # Free-threaded + bleeding-edge Pythons (plan A.5): genuinely exercises no-GIL thread safety.
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pytest tests/frozen -p no:cacheprovider

  build-wheel:
    name: build wheel (abi3 + 3.14t)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs,dev]"
          sphinx-build -W -b html docs docs/_build/html
