name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Python frozen suite — builds the extension (maturin) on every OS, proving cross-platform wheels
  # and running the thread-safety tests everywhere.
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install (builds the extension)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict, on the type stubs)
        run: mypy
      - name: Pytest (frozen M1 + M4 suite, incl. the super-linear reduction benchmark)
        run: pytest tests/frozen -p no:cacheprovider

  # Pure-Rust IR: formatting, clippy (deny warnings), unit tests, and the loom model.
  rust:
    name: rust (clippy + cargo test + loom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Link libpython for the test binary
        run: echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var(\"LIBDIR\"))')" >> "$GITHUB_ENV"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: loom model of the locking discipline
        run: RUSTFLAGS="--cfg loom" cargo test --lib loom_model

  # Free-threaded Python (plan A.5): genuinely exercises no-GIL thread safety. A required gate —
  # the extension is built gil_used=false and the locking discipline is loom-modeled.
  test-freethreaded:
    name: test py${{ matrix.python }} (free-threaded)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          pytest tests/frozen -p no:cacheprovider

  # Rust line coverage (plan B.3: the >=90% gate must not silently skip the Rust core; the
  # Python coverage gate only sees the thin re-export). Threshold rises with the suite.
  coverage-rust:
    name: rust coverage (cargo llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Link libpython for the test binary
        run: echo "LD_LIBRARY_PATH=$(python -c 'import sysconfig; print(sysconfig.get_config_var(\"LIBDIR\"))')" >> "$GITHUB_ENV"
      # lib.rs is the PyO3 binding layer: cargo test cannot import it, but the Python frozen
      # suites in the `test` jobs of this same workflow exercise it end-to-end. Everything else
      # (IR, optimizer, incremental reducer, codec, store) is gated here. Local: 92.3% lines.
      - name: cargo llvm-cov (fail under 85% lines, bindings excluded)
        run: cargo llvm-cov --ignore-filename-regex 'lib\.rs' --fail-under-lines 85

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs,dev]"
          sphinx-build -W -b html docs docs/_build/html
